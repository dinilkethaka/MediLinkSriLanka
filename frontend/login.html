<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediLink Sri Lanka — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Merriweather:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="screen-role">
  <div class="role-header">
    <div class="brand-logo">
      <div class="brand-icon">🏥</div>
      <span class="brand-name">MediLink</span>
    </div>
    <div class="brand-tagline">Centralized Health Management System - Sri Lanka</div>
  </div>

  <div class="role-cards">
    <div class="role-card" onclick="selectRole('admin')">
      <div class="role-icon-wrap">🛡</div>
      <div class="role-card-title">Admin</div>
      <div class="role-card-arrow">Login →</div>
    </div>

    <div class="role-card" onclick="selectRole('hospital')">
      <div class="role-icon-wrap">🏛</div>
      <div class="role-card-title">Hospital</div>
      <div class="role-card-arrow">Login →</div>
    </div>

    <div class="role-card" onclick="selectRole('doctor')">
      <div class="role-icon-wrap">👨‍⚕️</div>
      <div class="role-card-title">Doctor</div>
      <div class="role-card-arrow">Login →</div>
    </div>
  </div>
</div>

<!-- After login -->
<div id="screen-login">
  <a href="#" class="login-back" onclick="showRoleScreen()">← Back</a>

  <div class="login-card">
    <div id="login-role-badge" class="login-role-badge">🛡 Admin Login</div>
    <div class="login-title" id="login-title">Admin Login</div>
    <div class="login-sub">Enter your username and password</div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-username" placeholder="e.g., admin1">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter your password">
    </div>

    <button class="btn btn-primary btn-full" onclick="doLogin()">Continue →</button>

  </div>
</div>

<div class="toast" id="toast">
  <span id="toast-icon">✅</span>
  <span id="toast-msg">Done</span>
</div>

<!--apiLogin() , apiLogout() , apiAdminDashboard() -->
<script src="api.js"></script>
<script>
  let selectedRole = null;

  function selectRole(role) {
    selectedRole = role;

    const labels = {
      admin: { badge: '🛡 Admin Login', title: 'Admin Login' },
      hospital: { badge: '🏛 Hospital Login', title: 'Hospital Login' },
      doctor: { badge: '👨‍⚕️ Doctor Login', title: 'Doctor Login' }
    };

    document.getElementById('login-role-badge').textContent = labels[role].badge;
    document.getElementById('login-title').textContent = labels[role].title;

    document.getElementById('screen-role').style.display = 'none';
    document.getElementById('screen-login').style.display = 'flex';
  }

  function showRoleScreen() {
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-role').style.display = 'flex';
  }

  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();

    if (!username || !password) {
      showToast('Please enter username and password', 'error');
      return;
    }

    try {
      const result = await apiLogin(username, password);
      const role = result.user.role;

      showToast('Login successful!', 'success');

     const redirects = {
        admin: 'admin/dashboard.html',
        hospital: 'hospital/dashboard.html',
        doctor: 'doctor/select-hospital.html'
      };

      window.location.href = redirects[role];

    } catch (err) {
      showToast(err.message, 'error');
    }
  }

</script>
</body>
</html>
